<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a413ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1c1022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(40, 25, 50, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(164, 19, 236, 0.2);
        }
        .grid-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(164, 19, 236, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1c1022 0%, #0f0814 100%);
        }
        .gradient-mesh {
            background: radial-gradient(circle at 20% 30%, rgba(164, 19, 236, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative min-h-screen flex items-center justify-center p-6 gradient-bg">
<!-- Abstract Background Elements -->
<div class="absolute inset-0 grid-pattern opacity-40 pointer-events-none"></div>
<div class="absolute inset-0 gradient-mesh pointer-events-none"></div>
<!-- Main Card -->
<div class="glass-card relative w-full max-w-md p-8 md:p-10 rounded-xl shadow-2xl flex flex-col items-center">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-4 mb-8">
<div class="w-16 h-16 bg-primary/20 rounded-xl flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="visibility">visibility</span>
</div>
<div class="text-center">
<h1 class="text-3xl font-bold tracking-tight text-slate-100">EngLens</h1>
<p class="text-slate-400 text-sm mt-2 font-medium max-w-[280px]">
                        See what's really happening in your engineering team
                    </p>
</div>
</div>
<!-- Social Logins -->
<div class="w-full flex flex-col gap-3">
<!-- GitHub Button -->
<button class="w-full h-12 flex items-center justify-center gap-3 bg-slate-900 hover:bg-black transition-colors rounded-lg border border-slate-700 text-white font-semibold">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
                    Continue with GitHub
                </button>
<!-- Google Button -->
<button class="w-full h-12 flex items-center justify-center gap-3 bg-white hover:bg-slate-100 transition-colors rounded-lg text-slate-900 font-semibold shadow-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</div>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="h-[1px] flex-grow bg-slate-700"></div>
<span class="text-slate-500 text-sm font-medium">or</span>
<div class="h-[1px] flex-grow bg-slate-700"></div>
</div>
<!-- Email Login -->
<div class="w-full flex flex-col gap-4">
<div class="relative">
<input class="w-full h-12 bg-slate-800/50 border border-slate-700 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 rounded-lg px-4 text-slate-100 placeholder-slate-500 transition-all outline-none" placeholder="Work email address" type="email"/>
</div>
<button class="w-full h-12 bg-gradient-to-r from-primary to-[#c042ff] hover:brightness-110 transition-all rounded-lg text-white font-bold shadow-lg shadow-primary/20">
                    Continue with Email
                </button>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-xs text-slate-500 leading-relaxed max-w-[300px]">
                    By signing in, you agree to our <br/>
<a class="text-slate-300 hover:text-primary transition-colors underline underline-offset-2" href="#">Terms of Service</a> and 
                    <a class="text-slate-300 hover:text-primary transition-colors underline underline-offset-2" href="#">Privacy Policy</a>
</p>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed bottom-0 left-0 p-8 hidden lg:block">
<p class="text-slate-600 text-sm font-medium">© 2024 EngLens Inc.</p>
</div>
<div class="fixed top-0 right-0 p-8 hidden lg:block">
<div class="flex gap-6">
<a class="text-slate-400 hover:text-slate-100 text-sm transition-colors" href="#">Documentation</a>
<a class="text-slate-400 hover:text-slate-100 text-sm transition-colors" href="#">Support</a>
</div>
</div>
</div>
</body></html>
